name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev)
        run: python -m pip install -e ".[dev]"

      - name: Import smoke
        run: python -c "import fd, fd.stack_helpers.meta, fd.common; print('fd import OK')"

      - name: Tests
        run: pytest -q

      - name: README metrics match committed artifacts
        run: python scripts/check_readme_metrics.py
