# Stacking meta-models.
#  - meta-LR  (train_stack.py / eval_stack.py): the `meta:` block below.
#  - meta-MLP (train_stack_mlp.py): sklearn MLPClassifier; only the knobs it
#    honors are listed. pos_weight is derived at runtime from the meta-train
#    (validation) labels, so it is not configured here.

# LogisticRegression meta-learner.
meta:
  solver: liblinear
  max_iter: 5000
  class_weight: balanced
  random_state: 42

experiment:
  name: meta_mlp
  seed: 1337

paths:
  processed_dir: data_processed
  # ANTI-LEAKAGE: train_features MUST be the held-out validation split. The
  # meta-model learns from layer-0 scores on a window the base learners never
  # saw; test_features is scored exactly once by eval_stack.py.
  train_features: data_processed/X_val.npz
  test_features: data_processed/X_test.npz
  train_labels: data_processed/y_val.npy
  test_labels: data_processed/y_test.npy
  output_dir: outputs/meta_mlp
  checkpoint_dir: models/meta_mlp
  report: reports/meta_model.txt

# meta-MLP architecture (sklearn MLPClassifier).
model:
  hidden_dims: [16, 8]        # small; enough to learn interactions between base scores
  activation: relu

optimizer:
  name: adam                  # -> solver
  lr: 0.005                   # -> learning_rate_init
  weight_decay: 0.0001        # -> alpha (L2)

training:
  epochs: 100                 # -> max_iter
  batch_size: 2048
  early_stopping:
    monitor: val_auprc        # non-null enables MLPClassifier's n_iter_no_change
    patience: 8

logging:
  save_predictions: true
  predictions_path: outputs/meta_mlp/preds
  save_config_copy: true
