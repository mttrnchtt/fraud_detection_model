# Base MLP (layer-0). Backend is sklearn.neural_network.MLPClassifier, so only
# the knobs it actually honors are listed here. Class imbalance is handled with
# per-sample weights at fit() time (pos_weight below), not by MLPClassifier.
experiment:
  name: mlp
  seed: 1337

paths:
  processed_dir: data_processed
  train_features: data_processed/X_train.npz
  val_features: data_processed/X_val.npz
  test_features: data_processed/X_test.npz
  train_labels: data_processed/y_train.npy
  val_labels: data_processed/y_val.npy
  test_labels: data_processed/y_test.npy
  output_dir: outputs/mlp
  checkpoint_dir: models/mlp

model:
  hidden_dims: [256, 128, 64]
  activation: relu            # hidden-layer activation; output is sigmoid for binary

optimizer:
  name: adam                  # -> MLPClassifier solver
  lr: 0.01                    # -> learning_rate_init
  weight_decay: 0.0001        # -> alpha (L2). MLPClassifier has no dropout/batchnorm.

training:
  epochs: 200                 # -> max_iter
  batch_size: 1024
  pos_weight: 518.7           # sample weight for the positive class at fit()
  early_stopping:
    monitor: val_auprc        # non-null enables MLPClassifier's n_iter_no_change
    patience: 8               # -> n_iter_no_change

logging:
  save_predictions: true
  predictions_path: outputs/mlp/preds
  save_config_copy: true
